name: Smoke — Live Providers

# Hourly smoke test of the *non-billable* external AI providers against
# the production backend: OpenRouter vision (provider-probe) and the
# synthetic analyze payload. Each probe retries up to 3 times with a
# 20s backoff so that transient 429/504 from Google AI Studio /
# OpenRouter do NOT flip the job red — we only fire an alert when a
# provider is *persistently* broken (like the Reve 401 we caught on
# 2026-04-21 when the partner token expired).
#
# NB: image-gen-probe is intentionally NOT part of the hourly schedule
# — every call costs 30 Reve credits (~720/day) and the analyze probes
# already catch the common failure modes (token expiry, network, quota
# on OpenRouter). Reve itself is exercised live on every git push via
# the deploy-backend "Live provider smoke" step in .github/workflows/
# ci.yml, and can be fired on demand through the "Diag — Image Gen
# Probe" workflow (workflow_dispatch).

on:
  schedule:
    - cron: "17 * * * *"   # hourly at :17 (off-peak from CI/CD deploys)
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.RAILWAY_API_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
    steps:
      - name: Validate secrets
        run: |
          ok=true
          [ -z "$API_URL" ] && { echo "::error::RAILWAY_API_URL missing"; ok=false; }
          [ -z "$INTERNAL_API_KEY" ] && { echo "::error::INTERNAL_API_KEY missing"; ok=false; }
          [ "$ok" = true ] || exit 1
          mkdir -p artifacts

      - name: Probe external providers
        run: |
          set -eo pipefail
          mkdir -p artifacts

          cat > /tmp/validate_provider_probe.py <<'EOS'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          v_json = (data.get("vision_json_mode") or {}).get("status")
          v_plain = (data.get("vision_plain") or {}).get("status")
          if v_json != 200 or v_plain != 200:
              print(f"vision non-200: json={v_json} plain={v_plain}", file=sys.stderr)
              print(json.dumps(data, indent=2)[:1500], file=sys.stderr)
              sys.exit(1)
          print(f"OpenRouter vision: json={v_json} plain={v_plain}")
          EOS

          cat > /tmp/validate_ok.py <<'EOS'
          import json, pathlib, sys
          data = json.loads(pathlib.Path(sys.argv[1]).read_text())
          if not data.get("ok"):
              print("ok=false:", data.get("error_message"), file=sys.stderr)
              print(json.dumps(data, indent=2)[:1500], file=sys.stderr)
              sys.exit(1)
          marker = data.get("took_ms") or data.get("bytes") or "?"
          print(f"ok (marker={marker})")
          EOS

          probe() {
            local name="$1" method="$2" path="$3" out="$4" t="$5" validator="$6"
            local url="${API_URL}${path}"
            local attempts=3 sleep_s=20 last_err=""
            for i in $(seq 1 "$attempts"); do
              echo "::group::[$name] attempt $i/$attempts"
              local code
              code=$(curl -s -X "$method" -o "$out" -w "%{http_code}" \
                -H "x-internal-key: ${INTERNAL_API_KEY}" \
                -H "accept: application/json" \
                --max-time "$t" \
                "$url" || echo "000")
              echo "[$name] http=$code"
              if [ "$code" = "200" ]; then
                if python3 "$validator" "$out"; then
                  echo "[$name] OK"
                  echo "::endgroup::"
                  return 0
                else
                  last_err="validator rejected response"
                fi
              else
                last_err="http=$code"
                echo "[$name] body (first 800B):"
                head -c 800 "$out" 2>/dev/null || true
                echo
              fi
              echo "::endgroup::"
              [ "$i" -lt "$attempts" ] && sleep "$sleep_s"
            done
            echo "::error::[$name] failed after $attempts attempts: $last_err"
            return 1
          }

          probe provider-probe GET \
            "/api/v1/internal/diagnostics/provider-probe" \
            artifacts/provider-probe.json 45 \
            /tmp/validate_provider_probe.py

          probe synthetic-analyze POST \
            "/api/v1/internal/diagnostics/synthetic-analyze?mode=social" \
            artifacts/synthetic-analyze.json 120 \
            /tmp/validate_ok.py

          echo "All probes passed."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-live-${{ github.run_id }}
          path: artifacts/
          retention-days: 7
