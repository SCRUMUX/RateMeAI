name: Diag — Reve raw httpx probe

on:
  workflow_dispatch:

# One-shot probe that bypasses the Reve SDK and hits /v1/image/create
# directly via httpx. Used to isolate whether a 429 seen through the SDK
# is caused by a stale token in process memory, SDK misbehaviour, or a
# genuine Reve-side rate limit.

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.RAILWAY_API_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
    steps:
      - name: Validate secrets
        run: |
          [ -z "$API_URL" ]          && { echo "::error::RAILWAY_API_URL missing";     exit 1; }
          [ -z "$INTERNAL_API_KEY" ] && { echo "::error::INTERNAL_API_KEY missing";    exit 1; }
          echo ok

      - name: Fire reve-raw probe
        run: |
          set -e
          mkdir -p artifacts
          URL="${API_URL}/api/v1/internal/diagnostics/reve-raw"
          HTTP_CODE=$(curl -s -X POST -o artifacts/reve-raw.json -w "%{http_code}" \
            -H "x-internal-key: ${INTERNAL_API_KEY}" \
            -H "accept: application/json" \
            --max-time 180 \
            "$URL")
          echo "HTTP $HTTP_CODE"
          cat artifacts/reve-raw.json
          echo

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reve-raw-probe
          path: artifacts/
          retention-days: 7
