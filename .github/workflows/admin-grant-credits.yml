name: admin · grant credits

# Ad-hoc admin tool. Posts to the ``/api/v1/internal/admin/grant-credits``
# endpoint on the primary Railway backend, which applies the grant and
# writes the ``CreditTransaction(tx_type='admin_grant')`` audit row in a
# single transaction.
#
# Why an HTTP endpoint and not direct DB access:
#   * The project's Postgres service has no public TCP proxy enabled,
#     so the Railway DATABASE_URL is only reachable from inside the
#     Railway network (``postgres.railway.internal``). Rather than
#     punch a public hole in Postgres, we go through the already-
#     deployed ``app`` service.
#   * The endpoint is gated by the existing ``INTERNAL_API_KEY``
#     secret (reused from edge→primary traffic), and
#     workflow_dispatch is itself gated by repo write access — two
#     independent layers.
#
# Inputs mirror the CLI flags of ``scripts/grant_credits.py``. Always
# run with ``dry_run=true`` first when operating on a new user.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Identity provider"
        required: true
        type: choice
        options:
          - telegram
          - vk_id
      username:
        description: "Telegram @username (no @). provider=telegram only."
        required: false
        type: string
      first_name:
        description: "VK first_name (case-insensitive prefix match). provider=vk_id."
        required: false
        type: string
      telegram_id:
        description: "Exact Telegram numeric user id (disambiguates --username)."
        required: false
        type: string
      vk_id:
        description: "Exact VK external_id (disambiguates --first-name)."
        required: false
        type: string
      amount:
        description: "How many image_credits to add"
        required: true
        type: string
        default: "100"
      dry_run:
        description: "If true, only lists candidates without writing"
        required: true
        type: boolean
        default: true

jobs:
  grant:
    runs-on: ubuntu-latest
    env:
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      API_BASE_URL: ${{ secrets.RAILWAY_API_URL }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$INTERNAL_API_KEY" ]; then
            echo "::error::INTERNAL_API_KEY secret is not set"
            exit 1
          fi
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::RAILWAY_API_URL secret is not set"
            exit 1
          fi

      - name: Ping internal API
        run: |
          # Fails fast if the token is stale or the endpoint is down,
          # before we start constructing the grant payload.
          HTTP=$(curl -sS -o /tmp/ping.json -w "%{http_code}" \
            -H "X-Internal-Key: $INTERNAL_API_KEY" \
            "$API_BASE_URL/api/v1/internal/ping")
          echo "ping http=$HTTP"
          cat /tmp/ping.json || true
          if [ "$HTTP" != "200" ]; then
            echo "::error::Internal ping failed — check INTERNAL_API_KEY / RAILWAY_API_URL."
            exit 1
          fi

      - name: Grant credits
        env:
          PROVIDER: ${{ inputs.provider }}
          USERNAME: ${{ inputs.username }}
          FIRST_NAME: ${{ inputs.first_name }}
          TELEGRAM_ID: ${{ inputs.telegram_id }}
          VK_ID: ${{ inputs.vk_id }}
          AMOUNT: ${{ inputs.amount }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -uo pipefail
          # Build JSON payload with jq so we naturally drop empty
          # optional fields and escape any odd characters (Cyrillic
          # first_name etc.).
          PAYLOAD=$(jq -n \
            --arg provider "$PROVIDER" \
            --arg username "$USERNAME" \
            --arg first_name "$FIRST_NAME" \
            --arg telegram_id "$TELEGRAM_ID" \
            --arg vk_id "$VK_ID" \
            --argjson amount "$AMOUNT" \
            --argjson dry_run "$DRY_RUN" \
            '{
              provider: $provider,
              amount: $amount,
              dry_run: $dry_run,
              username: (if $username == "" then null else $username end),
              first_name: (if $first_name == "" then null else $first_name end),
              telegram_id: (if $telegram_id == "" then null else $telegram_id end),
              vk_id: (if $vk_id == "" then null else $vk_id end)
            }')
          echo "payload=$PAYLOAD"

          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "X-Internal-Key: $INTERNAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$API_BASE_URL/api/v1/internal/admin/grant-credits")

          echo "response http=$HTTP"
          jq . /tmp/resp.json || cat /tmp/resp.json

          if [ "$HTTP" != "200" ]; then
            echo "::error::Grant failed with HTTP $HTTP"
            exit 1
          fi

          STATUS=$(jq -r '.status' /tmp/resp.json)
          case "$STATUS" in
            granted)
              before=$(jq -r '.credits_before' /tmp/resp.json)
              after=$(jq -r '.credits_after' /tmp/resp.json)
              echo "OK — credits $before → $after"
              ;;
            dry_run)
              echo "DRY-RUN — would grant $(jq -r '.amount' /tmp/resp.json) to $(jq -r '.candidate.user_id' /tmp/resp.json)"
              ;;
            not_found)
              echo "::warning::No user matched the filter."
              exit 2
              ;;
            ambiguous)
              echo "::warning::Multiple candidates — disambiguate with --telegram-id or --vk-id:"
              jq -r '.candidates[] | "  - user_id=\(.user_id), username=\(.username // .profile_username), first_name=\(.first_name // .profile_first_name), credits=\(.credits_before), external_id=\(.external_id)"' /tmp/resp.json
              exit 3
              ;;
            *)
              echo "::error::Unexpected status: $STATUS"
              exit 4
              ;;
          esac

      - name: Summary
        if: always()
        run: |
          echo "## Admin · grant credits" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Input | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| provider | \`${{ inputs.provider }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| username | \`${{ inputs.username }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| first_name | \`${{ inputs.first_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| telegram_id | \`${{ inputs.telegram_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| vk_id | \`${{ inputs.vk_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| amount | \`${{ inputs.amount }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| dry_run | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
