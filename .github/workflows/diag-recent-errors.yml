name: Diag — Recent errors (read-only)

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Look-back window in hours (1..168)"
        default: "2"
        required: false

# Pulls the last N errors recorded by the primary backend. Read-only:
# does NOT call any external provider, so it never burns Reve rate-limit
# or OpenRouter credit.

jobs:
  pull:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.RAILWAY_API_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      HOURS: ${{ inputs.hours }}
    steps:
      - name: Validate secrets
        run: |
          [ -z "$API_URL" ]          && { echo "::error::RAILWAY_API_URL missing";     exit 1; }
          [ -z "$INTERNAL_API_KEY" ] && { echo "::error::INTERNAL_API_KEY missing";    exit 1; }
          echo ok

      - name: Pull recent-errors
        run: |
          set -e
          mkdir -p artifacts
          H="${HOURS:-2}"
          URL="${API_URL}/api/v1/internal/diagnostics/recent-errors?limit=30&hours=${H}"
          HTTP_CODE=$(curl -s -o artifacts/recent-errors.json -w "%{http_code}" \
            -H "x-internal-key: ${INTERNAL_API_KEY}" \
            -H "accept: application/json" \
            --max-time 60 \
            "$URL")
          echo "HTTP $HTTP_CODE"
          cat artifacts/recent-errors.json | python3 -m json.tool || cat artifacts/recent-errors.json

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recent-errors
          path: artifacts/
          retention-days: 7
