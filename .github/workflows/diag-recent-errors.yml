name: Diag — Recent FAILED tasks

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "How many hours back to look"
        default: "2"
      limit:
        description: "Max items"
        default: "20"

# Read-only: fetches the last FAILED tasks (no PII, no tokens, no inputs)
# from the primary backend. Use when a user reports a failed generation —
# we want the exact worker error_message for mapping/root-causing without
# touching Reve/OpenRouter again.

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.RAILWAY_API_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
    steps:
      - name: Validate secrets
        run: |
          [ -z "$API_URL" ]          && { echo "::error::RAILWAY_API_URL missing";     exit 1; }
          [ -z "$INTERNAL_API_KEY" ] && { echo "::error::INTERNAL_API_KEY missing";    exit 1; }
          echo ok

      - name: Fetch recent errors
        run: |
          set -e
          mkdir -p artifacts
          HRS="${{ github.event.inputs.hours }}"
          LIM="${{ github.event.inputs.limit }}"
          URL="${API_URL}/api/v1/internal/diagnostics/recent-errors?hours=${HRS}&limit=${LIM}"
          HTTP_CODE=$(curl -s -o artifacts/recent-errors.json -w "%{http_code}" \
            -H "x-internal-key: ${INTERNAL_API_KEY}" \
            -H "accept: application/json" \
            --max-time 60 "$URL")
          echo "HTTP $HTTP_CODE"
          python3 - <<'PY'
          import json, pathlib
          data = json.loads(pathlib.Path("artifacts/recent-errors.json").read_text())
          items = data.get("items", []) if isinstance(data, dict) else data
          print(f"Total: {len(items)}")
          for it in items:
              print("---")
              for k in ("task_id", "mode", "stage", "exc_type",
                       "updated_at", "duration_ms"):
                  print(f"{k}: {it.get(k)}")
              print(f"error: {it.get('error_message')}")
          PY

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recent-errors
          path: artifacts/
          retention-days: 7
