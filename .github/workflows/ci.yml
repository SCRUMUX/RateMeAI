name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Do not cancel main-branch deploys mid-flight (Railway can be left inconsistent).
# Only cancel redundant pull_request runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Test & Lint ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ratemeai
          POSTGRES_PASSWORD: ratemeai
          POSTGRES_DB: ratemeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ratemeai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install opencv-python-headless>=4.6.0

      - name: Lint with ruff
        run: ruff check src/ tests/ --select=E,F,W --ignore=E501

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ratemeai:ratemeai@127.0.0.1:5432/ratemeai
          REDIS_URL: redis://127.0.0.1:6379/0
          APP_ENV: dev
          API_BASE_URL: http://127.0.0.1:8000
        run: python -m pytest tests/ -v --tb=short

      - name: Typecheck frontend
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit

  # ─── Deploy backend (Railway: app + worker + bot) ───────────
  deploy-backend:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          ok=true
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN is not set"
            ok=false
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::RAILWAY_PROJECT_ID is not set"
            ok=false
          fi
          [ "$ok" = true ] || exit 1

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set deploy SHA and edge config
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          for SVC in app bot worker; do
            railway variables set DEPLOY_GIT_SHA="$SHORT_SHA" -s "$SVC" -e production --skip-deploys || true
          done
          railway variables set EDGE_API_URL="https://ru.ailookstudio.ru" -s bot -e production --skip-deploys || true
          if [ -n "$INTERNAL_API_KEY" ]; then
            echo "Syncing INTERNAL_API_KEY to Railway app service..."
            railway variables set INTERNAL_API_KEY="$INTERNAL_API_KEY" -s app -e production --skip-deploys || true
          else
            echo "::warning::INTERNAL_API_KEY secret not set — edge→primary auth may break"
          fi

      - name: Deploy Railway services (sequential)
        run: |
          set -e
          echo "Deploying app..."
          railway up -s app -d -e production
          echo "Deploying worker..."
          railway up -s worker -d -e production
          echo "Deploying bot..."
          railway up -s bot -d -e production

      - name: Wait for Railway build & deploy
        run: sleep 180

      - name: Health check
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          API_URL="${RAILWAY_API_URL:-https://app-production-6986.up.railway.app}"
          echo "Checking $API_URL/health ..."
          for i in 1 2 3 4 5 6 7 8; do
            RESP=$(curl -sf "$API_URL/health" || echo "FAIL")
            echo "Attempt $i: $RESP"
            if echo "$RESP" | grep -q '"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            if [ "$i" -eq 8 ]; then
              echo "::error::Health check failed after 8 attempts"
              exit 1
            fi
            sleep 45
          done

      - name: Deploy summary
        if: always()
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | [Railway Dashboard](https://railway.com/project/${{ secrets.RAILWAY_PROJECT_ID }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | [Vercel](https://ailookstudio.vercel.app) |" >> $GITHUB_STEP_SUMMARY
          API_URL="${RAILWAY_API_URL:-https://app-production-6986.up.railway.app}"
          echo "| API Health | [/health](${API_URL}/health) |" >> $GITHUB_STEP_SUMMARY

  # ─── Deploy RU edge server (SSH) ──────────────────────────
  deploy-ru:
    needs: [test, deploy-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate RU secrets
        env:
          RU_SSH_HOST: ${{ secrets.RU_SSH_HOST }}
          RU_SSH_KEY: ${{ secrets.RU_SSH_KEY }}
          RU_SSH_USER: ${{ secrets.RU_SSH_USER }}
        run: |
          if [ -z "$RU_SSH_HOST" ] || [ -z "$RU_SSH_KEY" ] || [ -z "$RU_SSH_USER" ]; then
            echo "::warning::RU_SSH_HOST, RU_SSH_KEY, or RU_SSH_USER not set — skipping RU deploy"
            echo "SKIP_RU=true" >> $GITHUB_ENV
          fi

      - name: Deploy to RU edge server
        if: env.SKIP_RU != 'true'
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_GIT_SHA: ${{ github.sha }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        with:
          host: ${{ secrets.RU_SSH_HOST }}
          username: ${{ secrets.RU_SSH_USER }}
          key: ${{ secrets.RU_SSH_KEY }}
          port: 22
          command_timeout: 10m
          envs: DEPLOY_GIT_SHA,INTERNAL_API_KEY
          script: |
            export DEPLOY_GIT_SHA="${DEPLOY_GIT_SHA:0:12}"
            # Sync INTERNAL_API_KEY into .env.ru if provided
            if [ -n "$INTERNAL_API_KEY" ]; then
              ENV_FILE="/opt/ratemeai/.env.ru"
              if grep -q '^INTERNAL_API_KEY=' "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^INTERNAL_API_KEY=.*|INTERNAL_API_KEY=${INTERNAL_API_KEY}|" "$ENV_FILE"
              else
                echo "INTERNAL_API_KEY=${INTERNAL_API_KEY}" >> "$ENV_FILE"
              fi
              echo "INTERNAL_API_KEY synced to .env.ru"
            fi
            bash /opt/ratemeai/deploy/ru/update.sh

      - name: RU smoke tests
        if: env.SKIP_RU != 'true'
        run: |
          set -e
          DOMAIN="https://ru.ailookstudio.ru"
          SHORT_SHA="${GITHUB_SHA:0:12}"
          FAIL=0

          echo "=== Smoke test 1: /health with git SHA ==="
          sleep 20
          HEALTH=$(curl -sf "$DOMAIN/health" || echo "FAIL")
          echo "  $HEALTH"
          if ! echo "$HEALTH" | grep -q '"ok"'; then
            echo "::error::Health check failed"
            FAIL=1
          fi
          if ! echo "$HEALTH" | grep -q "$SHORT_SHA"; then
            echo "::warning::Health response missing expected SHA $SHORT_SHA"
          fi

          echo "=== Smoke test 2: /version.json (frontend build) ==="
          VER=$(curl -sf "$DOMAIN/version.json" || echo "FAIL")
          echo "  $VER"
          if [ "$VER" = "FAIL" ]; then
            echo "::warning::version.json not available"
          fi

          echo "=== Smoke test 3: catalog API (no auth) ==="
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$DOMAIN/api/v1/catalog/styles?mode=dating")
          echo "  HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Catalog API returned $HTTP_CODE"
            FAIL=1
          fi

          echo "=== Smoke test 4: auth + DB-dependent endpoint ==="
          AUTH_RESP=$(curl -sf -X POST "$DOMAIN/api/v1/auth/web" \
            -H "Content-Type: application/json" \
            -d '{"device_id":"ci-smoke-test"}' || echo "FAIL")
          echo "  auth: ${AUTH_RESP:0:80}..."
          if echo "$AUTH_RESP" | grep -q "session_token"; then
            TOKEN=$(echo "$AUTH_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_token'])")
            TASKS_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "$DOMAIN/api/v1/tasks?limit=1" \
              -H "Authorization: Bearer $TOKEN")
            echo "  tasks: HTTP $TASKS_CODE"
            if [ "$TASKS_CODE" != "200" ]; then
              echo "::error::Tasks endpoint returned $TASKS_CODE (expected 200 — DB migration may have failed)"
              FAIL=1
            fi
          else
            echo "::error::Auth failed: $AUTH_RESP"
            FAIL=1
          fi

          echo "=== Smoke test 5: edge→primary internal API connectivity ==="
          READINESS=$(curl -sf "$DOMAIN/readiness" || echo "FAIL")
          echo "  $READINESS"
          if echo "$READINESS" | grep -qE '"primary_reachable"\s*:\s*true'; then
            echo "  Edge→primary connectivity OK"
          else
            echo "::error::Edge→primary internal API connectivity failed (INTERNAL_API_KEY mismatch or primary unreachable)"
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more smoke tests failed"
            exit 1
          fi
          echo "All smoke tests passed"

      - name: RU deploy summary
        if: always() && env.SKIP_RU != 'true'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "## RU Edge Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`ru.ailookstudio.ru\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | [/health](https://ru.ailookstudio.ru/health) |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | [/version.json](https://ru.ailookstudio.ru/version.json) |" >> $GITHUB_STEP_SUMMARY
