name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Do not cancel main-branch deploys mid-flight (Railway can be left inconsistent).
# Only cancel redundant pull_request runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Test & Lint ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ratemeai
          POSTGRES_PASSWORD: ratemeai
          POSTGRES_DB: ratemeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ratemeai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install opencv-python-headless>=4.6.0

      - name: Lint with ruff
        run: ruff check src/ tests/ --select=E,F,W --ignore=E501

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ratemeai:ratemeai@127.0.0.1:5432/ratemeai
          REDIS_URL: redis://127.0.0.1:6379/0
          APP_ENV: dev
          API_BASE_URL: http://127.0.0.1:8000
        run: python -m pytest tests/ -v --tb=short

      - name: Typecheck frontend
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit

  # ─── Deploy backend (Railway: app + worker + bot) ───────────
  deploy-backend:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          ok=true
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN is not set"
            ok=false
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::RAILWAY_PROJECT_ID is not set"
            ok=false
          fi
          [ "$ok" = true ] || exit 1

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set deploy SHA and edge config
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          for SVC in app bot worker; do
            railway variables set DEPLOY_GIT_SHA="$SHORT_SHA" -s "$SVC" -e production --skip-deploys || true
          done
          railway variables set EDGE_API_URL="https://ru.ailookstudio.ru" -s bot -e production --skip-deploys || true

      - name: Deploy Railway services (sequential)
        run: |
          set -e
          echo "Deploying app..."
          railway up -s app -d -e production
          echo "Deploying worker..."
          railway up -s worker -d -e production
          echo "Deploying bot..."
          railway up -s bot -d -e production

      - name: Wait for Railway build & deploy
        run: sleep 180

      - name: Health check
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          API_URL="${RAILWAY_API_URL:-https://app-production-6986.up.railway.app}"
          echo "Checking $API_URL/health ..."
          for i in 1 2 3 4 5 6 7 8; do
            RESP=$(curl -sf "$API_URL/health" || echo "FAIL")
            echo "Attempt $i: $RESP"
            if echo "$RESP" | grep -q '"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            if [ "$i" -eq 8 ]; then
              echo "::error::Health check failed after 8 attempts"
              exit 1
            fi
            sleep 45
          done

      - name: Deploy summary
        if: always()
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | [Railway Dashboard](https://railway.com/project/${{ secrets.RAILWAY_PROJECT_ID }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | [Vercel](https://ailookstudio.vercel.app) |" >> $GITHUB_STEP_SUMMARY
          API_URL="${RAILWAY_API_URL:-https://app-production-6986.up.railway.app}"
          echo "| API Health | [/health](${API_URL}/health) |" >> $GITHUB_STEP_SUMMARY

  # ─── Deploy RU edge server (SSH) ──────────────────────────
  deploy-ru:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Validate RU secrets
        env:
          RU_SSH_HOST: ${{ secrets.RU_SSH_HOST }}
          RU_SSH_KEY: ${{ secrets.RU_SSH_KEY }}
        run: |
          if [ -z "$RU_SSH_HOST" ] || [ -z "$RU_SSH_KEY" ]; then
            echo "::warning::RU_SSH_HOST or RU_SSH_KEY not set — skipping RU deploy"
            echo "SKIP_RU=true" >> $GITHUB_ENV
          fi

      - name: Deploy to RU edge server
        if: env.SKIP_RU != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RU_SSH_HOST }}
          username: ${{ secrets.RU_SSH_USER }}
          key: ${{ secrets.RU_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /opt/ratemeai

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding frontend ==="
            docker compose -f docker-compose.ru.yml --profile build-only build --no-cache web

            TEMP_CONTAINER=$(docker create ratemeai-web-ru:latest)
            docker cp "$TEMP_CONTAINER:/usr/share/nginx/html" /tmp/web-dist
            docker rm "$TEMP_CONTAINER"

            docker run --rm \
                -v ratemeai_web_dist:/usr/share/nginx/html \
                -v /tmp/web-dist:/src:ro \
                alpine sh -c "rm -rf /usr/share/nginx/html/* && cp -r /src/* /usr/share/nginx/html/"
            rm -rf /tmp/web-dist

            echo "=== Rebuilding and restarting backend ==="
            docker compose -f docker-compose.ru.yml up -d --build app

            echo "=== Restarting nginx (re-establish bind mounts after git pull) ==="
            docker compose -f docker-compose.ru.yml restart nginx

            echo "=== Done ==="
            docker compose -f docker-compose.ru.yml ps

      - name: RU health check
        if: env.SKIP_RU != 'true'
        run: |
          echo "Waiting 15s for RU server to stabilize..."
          sleep 15
          for i in 1 2 3 4 5; do
            RESP=$(curl -sf "https://ru.ailookstudio.ru/health" || echo "FAIL")
            echo "Attempt $i: $RESP"
            if echo "$RESP" | grep -q '"ok"'; then
              echo "RU health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::RU health check did not pass (non-fatal)"

      - name: RU deploy summary
        if: always() && env.SKIP_RU != 'true'
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "## RU Edge Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`ru.ailookstudio.ru\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | [/health](https://ru.ailookstudio.ru/health) |" >> $GITHUB_STEP_SUMMARY
