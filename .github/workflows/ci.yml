name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ratemeai
          POSTGRES_PASSWORD: ratemeai
          POSTGRES_DB: ratemeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ratemeai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install opencv-python-headless>=4.6.0

      - name: Lint with ruff
        run: ruff check src/ tests/ --select=E,F,W --ignore=E501

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ratemeai:ratemeai@127.0.0.1:5432/ratemeai
          REDIS_URL: redis://127.0.0.1:6379/0
          APP_ENV: dev
          API_BASE_URL: http://127.0.0.1:8000
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ratemeai:ci .

  deploy:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy app
        run: railway up -s app -d
      - name: Deploy worker
        run: railway up -s worker -d
      - name: Deploy bot
        run: railway up -s bot -d
