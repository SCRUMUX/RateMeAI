name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Test & Lint ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ratemeai
          POSTGRES_PASSWORD: ratemeai
          POSTGRES_DB: ratemeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ratemeai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install opencv-python-headless>=4.6.0

      - name: Lint with ruff
        run: ruff check src/ tests/ --select=E,F,W --ignore=E501

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://ratemeai:ratemeai@127.0.0.1:5432/ratemeai
          REDIS_URL: redis://127.0.0.1:6379/0
          APP_ENV: dev
          API_BASE_URL: http://127.0.0.1:8000
        run: python -m pytest tests/ -v --tb=short

      - name: Typecheck frontend
        working-directory: web
        run: |
          npm ci
          npx tsc --noEmit

  # ─── Deploy backend (Railway: app + worker + bot) ───────────
  deploy-backend:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          ok=true
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN is not set"
            ok=false
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::RAILWAY_PROJECT_ID is not set"
            ok=false
          fi
          [ "$ok" = true ] || exit 1

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Sync env vars to Railway services
        run: |
          for SVC in app bot worker; do
            railway variables set CREDIT_PACKS="1:59,5:199,15:499,30:899" -s "$SVC" -e production || true
          done
          # Internal API key for edge (RU server) → primary (Railway) communication
          railway variables set INTERNAL_API_KEY="FK9LjLojdSmccr9zvX3qlANVP03EV3mrdJ_dWdR5Gqk" -s app -e production || true

      - name: Deploy all services in parallel
        run: |
          railway up -s app    -d -e production &
          PID_APP=$!
          railway up -s worker -d -e production &
          PID_WORKER=$!
          railway up -s bot    -d -e production &
          PID_BOT=$!

          FAIL=0
          wait $PID_APP    || { echo "::error::app deploy failed";    FAIL=1; }
          wait $PID_WORKER || { echo "::error::worker deploy failed"; FAIL=1; }
          wait $PID_BOT    || { echo "::error::bot deploy failed";    FAIL=1; }
          exit $FAIL

      - name: Wait for Railway build & deploy
        run: sleep 120

      - name: Health check
        run: |
          API_URL="https://app-production-6986.up.railway.app"
          echo "Checking $API_URL/health ..."
          for i in 1 2 3 4 5; do
            RESP=$(curl -sf "$API_URL/health" || echo "FAIL")
            echo "Attempt $i: $RESP"
            if echo "$RESP" | grep -q '"ok"'; then
              echo "Health check passed"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::Health check failed after 5 attempts"
              exit 1
            fi
            sleep 30
          done

      - name: Deploy summary
        if: always()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHORT_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | [Railway Dashboard](https://railway.com/project/${{ secrets.RAILWAY_PROJECT_ID }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | [Vercel](https://ailookstudio.vercel.app) |" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | [/health](https://app-production-6986.up.railway.app/health) |" >> $GITHUB_STEP_SUMMARY
