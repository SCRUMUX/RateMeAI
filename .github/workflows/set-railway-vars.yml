name: Set Railway Variables (one-time)

on:
  workflow_dispatch:

jobs:
  set-vars:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Google OAuth variables
        env:
          GC_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GC_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          railway variables set GOOGLE_CLIENT_ID="$GC_ID" -s app -e production --skip-deploys
          railway variables set GOOGLE_CLIENT_SECRET="$GC_SECRET" -s app -e production --skip-deploys
          echo "Google OAuth variables set on Railway app service"

      - name: Redeploy app to pick up new vars
        run: |
          railway up -s app -d -e production || echo "Redeploy triggered"
