version: "3.9"

# RU edge server: frontend + API (edge mode) + PostgreSQL + Redis
# No worker — AI processing is proxied to the primary Railway backend.
#
# Usage:
#   1. Copy .env.ru.example → .env.ru and fill in values
#   2. Build the frontend: docker compose -f docker-compose.ru.yml build web
#   3. Start all services: docker compose -f docker-compose.ru.yml up -d
#   4. SSL: run certbot init first (see deploy/ru/setup.sh)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ratemeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.ru}
      POSTGRES_DB: ${POSTGRES_DB:-ratemeai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ratemeai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "root"
    entrypoint: ["docker-entrypoint.sh"]
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.ru
    environment:
      DEPLOYMENT_MODE: edge
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ratemeai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ratemeai}
      REDIS_URL: redis://redis:6379/0
      STORAGE_LOCAL_PATH: /app/storage
      APP_ENV: prod
      DEPLOY_GIT_SHA: ${DEPLOY_GIT_SHA:-}
      MARKET_ID: ru
      SERVICE_ROLE: api
      COMPUTE_MODE: remote
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://ru.ailookstudio.ru}
        VITE_MARKET_ID: ${VITE_MARKET_ID:-ru}
        DEPLOY_GIT_SHA: ${DEPLOY_GIT_SHA:-}
    image: ratemeai-web-ru:latest
    profiles:
      - build-only

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/ru/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - web_dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy

  # Run periodically: docker compose -f docker-compose.ru.yml run --rm certbot renew
  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - certbot

volumes:
  pgdata:
    name: ratemeai_pgdata
  app_storage:
    name: ratemeai_app_storage
  web_dist:
    name: ratemeai_web_dist
  certbot_www:
    name: ratemeai_certbot_www
