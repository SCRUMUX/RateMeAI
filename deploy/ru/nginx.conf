proxy_cache_path /var/cache/nginx/storage levels=1:2 keys_zone=storage_cache:10m max_size=500m inactive=1d;

upstream api_backend {
    server app:8000;
}

server {
    listen 80;
    server_name ru.ailookstudio.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ru.ailookstudio.ru;

    ssl_certificate     /etc/letsencrypt/live/ru.ailookstudio.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.ailookstudio.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 12m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for all frontend routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Explicit no-cache for index.html and version.json (must always serve fresh)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Short cache for favicon/logo (allow updates to propagate)
    location = /favicon.png {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    location = /img/logo.png {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Long cache for static assets (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SSE endpoint: disable buffering for real-time task progress
    location /api/v1/sse/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding off;
    }

    # API reverse proxy to local FastAPI
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
        proxy_connect_timeout 10s;
    }

    # Storage (user images, generated images) — cached at nginx level
    location /storage/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache storage_cache;
        proxy_cache_valid 200 1d;
        proxy_cache_valid 404 1m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Health/readiness/metrics passthrough
    location /health {
        proxy_pass http://api_backend;
    }

    location /readiness {
        proxy_pass http://api_backend;
    }

    location /openapi.json {
        proxy_pass http://api_backend;
    }

    location /docs {
        proxy_pass http://api_backend;
    }

    location /redoc {
        proxy_pass http://api_backend;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
